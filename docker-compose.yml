services:
  postgres:
    image: postgres:17
    ports:
      - 127.0.0.1:5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-flexprice}
    volumes:
      - ./migrations/postgres:/docker-entrypoint-initdb.d/
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-flexprice}"]
      interval: 5s
      timeout: 3s
      retries: 100

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "127.0.0.1:29092:29092"
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-ca497efe-9f82-4b84-890b-d9969a9a2e1c}
      KAFKA_BROKER_ID: 0
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 5s
      timeout: 3s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:24.9-alpine
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9009:9009"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-flexprice}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://clickhouse:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:main
    profiles:
      - dev
    depends_on:
      - kafka
    ports:
      - "127.0.0.1:8084:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME:-local}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      DYNAMIC_CONFIG_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://kafka-ui:8080/"]
      interval: 10s
      timeout: 5s
      retries: 30

  temporal:
    image: temporalio/auto-setup:1.26.2
    ports:
      - "7233:7233"
    environment:
      - ENABLE_ES=false
      - DB=postgres12
      - DB_PORT=${POSTGRES_PORT:-5432}
      - DB_USER=${TEMPORAL_DB_USER:?TEMPORAL_DB_USER is required}
      - DB_PWD=${TEMPORAL_DB_PASSWORD:?TEMPORAL_DB_PASSWORD is required}
      - DB_NAME=${TEMPORAL_DB_NAME:-temporal}
      - DB_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_SEEDS=${POSTGRES_HOST:-postgres}
      - TEMPORAL_PERSISTENCE_SCHEMA_DIR=/etc/temporal/schema/postgresql/v96/temporal/versioned
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
    depends_on:
      - temporal

  # Build stage as a separate service that other services can depend on
  flexprice-build:
    image: flexprice-app:local
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - build-only
    command: ["echo", "Build complete"]

  flexprice-api:
    image: flexprice-app:local
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      temporal:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - FLEXPRICE_DEPLOYMENT_MODE=api
      # Override config.yaml settings for containerized environment
      - FLEXPRICE_POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - FLEXPRICE_POSTGRES_READER_HOST=${POSTGRES_READER_HOST:-postgres}
      - FLEXPRICE_KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - FLEXPRICE_CLICKHOUSE_ADDRESS=${CLICKHOUSE_ADDRESS:-clickhouse:9000}
      - FLEXPRICE_TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      # Auth: API key mode — secret values provided via environment
      - FLEXPRICE_AUTH_PROVIDER=${FLEXPRICE_AUTH_PROVIDER:-api_key}
      - FLEXPRICE_AUTH_API_KEY_HEADER=${FLEXPRICE_AUTH_API_KEY_HEADER:-x-api-key}
      - FLEXPRICE_AUTH_API_KEY_KEYS=${FLEXPRICE_AUTH_API_KEY_KEYS:?FLEXPRICE_AUTH_API_KEY_KEYS is required}
    volumes:
      - ./internal/config:/app/internal/config
    restart: unless-stopped

  flexprice-consumer:
    image: flexprice-app:local
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      - FLEXPRICE_DEPLOYMENT_MODE=consumer
      # Override config.yaml settings for containerized environment
      - FLEXPRICE_POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - FLEXPRICE_POSTGRES_READER_HOST=${POSTGRES_READER_HOST:-postgres}
      - FLEXPRICE_KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - FLEXPRICE_CLICKHOUSE_ADDRESS=${CLICKHOUSE_ADDRESS:-clickhouse:9000}
      - FLEXPRICE_TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      # Auth: API key mode — secret values provided via environment
      - FLEXPRICE_AUTH_PROVIDER=${FLEXPRICE_AUTH_PROVIDER:-api_key}
      - FLEXPRICE_AUTH_API_KEY_HEADER=${FLEXPRICE_AUTH_API_KEY_HEADER:-x-api-key}
      - FLEXPRICE_AUTH_API_KEY_KEYS=${FLEXPRICE_AUTH_API_KEY_KEYS:?FLEXPRICE_AUTH_API_KEY_KEYS is required}
    volumes:
      - ./internal/config:/app/internal/config
    restart: unless-stopped

  flexprice-worker:
    image: flexprice-app:local
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      - FLEXPRICE_DEPLOYMENT_MODE=temporal_worker
      # Override config.yaml settings for containerized environment
      - FLEXPRICE_POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - FLEXPRICE_POSTGRES_READER_HOST=${POSTGRES_READER_HOST:-postgres}
      - FLEXPRICE_KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - FLEXPRICE_CLICKHOUSE_ADDRESS=${CLICKHOUSE_ADDRESS:-clickhouse:9000}
      - FLEXPRICE_TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      # Auth: API key mode — secret values provided via environment
      - FLEXPRICE_AUTH_PROVIDER=${FLEXPRICE_AUTH_PROVIDER:-api_key}
      - FLEXPRICE_AUTH_API_KEY_HEADER=${FLEXPRICE_AUTH_API_KEY_HEADER:-x-api-key}
      - FLEXPRICE_AUTH_API_KEY_KEYS=${FLEXPRICE_AUTH_API_KEY_KEYS:?FLEXPRICE_AUTH_API_KEY_KEYS is required}
    volumes:
      - ./internal/config:/app/internal/config
    restart: unless-stopped

volumes:
  postgres-data:
  kafka-data:
  clickhouse-data:
